name: Linting Workflow

on:
  push:
    branches: [
    "feature/linting-workflow",
    "feature/home-page",
    "feature/about-page",
    "feature/projects-page",  # ✅ Add this line
    "develop"
  ]
  pull_request:
    branches: [ "develop" ]

jobs:
  lint:
    name: Linting Workflow / lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Run HTMLHint
        run: npx htmlhint "**/*.html"

      - name: Run Stylelint
        run: npx stylelint "**/*.css"
